version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - nutri_data:/app/data
    environment:
      - DATABASE_PATH=/app/data/nutri.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-please}
      - USDA_API_KEY=${USDA_API_KEY:-DEMO_KEY}
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid email profile groups}
      - OIDC_GROUPS_CLAIM=${OIDC_GROUPS_CLAIM:-groups}
      - OIDC_ADMIN_GROUP=${OIDC_ADMIN_GROUP:-}
      - OIDC_USER_GROUP=${OIDC_USER_GROUP:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nutri_data:
